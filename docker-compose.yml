version: '3.8'

services:
  pyro-engine:
    image: pyronear/pyro-engine:latest
    environment:
      - API_URL=${API_URL}
      - LAT=${LAT}
      - LON=${LON}
      - CAM_USER=${CAM_USER}
      - CAM_PWD=${CAM_PWD}
    command: python run.py
    volumes:
      - ./data:/usr/src/app/data
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  img-downloader:
    image: pyronear/pyro-engine:latest

    command: python dl_image.py
    volumes:
      - ./data:/usr/src/app/data
    restart: always

  promtail:
    image: grafana/promtail:2.7.3
    ports:
      - 8300:8300
    volumes:
      - /var/log:/var/log
      - ./promtail/config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers
    env_file:
      - .env
    command: 
      -config.file=/etc/promtail/config.yml
      -config.expand-env=true
    restart: always
